{% extends "app/layout.html" %}

{% block app_title %}{{ strings.TASKS_TITLE }}{% endblock %}

{% block content %}
<div style="padding-top: 1.25rem;">
    <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem;">{{ strings.TASK_TAB_MANUAL }}</h2>
</div>

<!-- Unified Instruction Card -->
<div class="glass-card">
    <div style="font-size: 0.95rem; line-height: 1.8; white-space: pre-line;">
        {{ strings.TASKS_MANUAL_MSG|safe }}
    </div>
</div>

<!-- Submit Form -->
<div class="glass-card">
    <div class="card-title">{{ strings.TASK_START_SUBMIT_LBL }}</div>
    <form action="{{ url_for('app_task_submit') }}" method="POST">
        <div class="form-group">
            <label class="form-label">{{ strings.TASK_START_SUBMIT_LBL }}</label>
            <input type="email" name="gmail" class="form-control" placeholder="{{ strings.TASK_START_SUBMIT_PH }}" required>
        </div>
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-paper-plane"></i> {{ strings.TASK_START_SUBMIT_BTN }}
        </button>
    </form>
</div>

<div style="text-align: center; margin-top: 1rem;">
    <a href="{{ url_for('app_tasks') }}" class="btn btn-outline btn-sm" style="width: auto; display: inline-flex;">
        <i class="fa-solid fa-arrow-left"></i> {{ strings.TASK_START_BACK }}
    </a>
</div>
{% endblock %}
