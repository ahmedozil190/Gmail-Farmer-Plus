{% extends "app/layout.html" %}

{% block app_title %}{{ strings.TASKS_TITLE }}{% endblock %}

{% block content %}
<div
    style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding: 1.25rem 5px 0;">
    <h2 style="font-size: 1.2rem; font-weight: 800; margin: 0;">{{ strings.TASK_TAB_MANUAL }}</h2>
    <a href="{{ url_for('app_tasks') }}"
        style="color: var(--secondary-color); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 5px;">
        <i class="fa-solid fa-chevron-left"></i> {{ strings.BTN_PREV_PAGE_INLINE }}
    </a>
</div>

<!-- Unified Instruction Card -->
<div class="glass-card">
    <div style="font-size: 0.95rem; line-height: 1.8; white-space: pre-line;">
        {{ strings.TASKS_MANUAL_MSG|safe }}
    </div>
</div>

<!-- Submit Form -->
<div class="glass-card">
    <div class="card-title">{{ strings.TASK_START_SUBMIT_LBL }}</div>
    <form action="{{ url_for('app_task_submit') }}" method="POST">
        <div class="form-group">
            <label class="form-label">{{ strings.TASK_START_SUBMIT_LBL }}</label>
            <input type="email" name="gmail" class="form-control" placeholder="{{ strings.TASK_START_SUBMIT_PH }}"
                required>
        </div>
        <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-paper-plane"></i> {{ strings.TASK_START_SUBMIT_BTN }}
        </button>
        <a href="{{ url_for('app_tasks') }}" class="btn btn-outline" style="margin-top: 12px;">
            <i class="fa-solid fa-arrow-{{ 'right' if (user and user.language == 'ar') or not user else 'left' }}"></i>
            {{ strings.TASK_START_BACK }}
        </a>
    </form>
</div>

{% endblock %}
